name: Build and Release Santotsu

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 * * * *" # Run every hour
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      SHOULD_RUN: ${{ steps.compare.outputs.SHOULD_RUN }}
      LATEST_SHA: ${{ steps.compare.outputs.LATEST_SHA }}
      LAST_SHA: ${{ steps.compare.outputs.LAST_SHA }}
      VERSION: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout Repository
        run: |
          git clone --depth 1 --branch dev https://git.rebelonion.dev/rebelonion/Dantotsu.git .

      - name: Download last SHA from latest release
        id: download-last-sha
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/Shebyyy/Dantotsu-Alpha/releases/latest)
          SHA_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name == "last_sha.txt") | .browser_download_url')
          if [ -n "$SHA_URL" ]; then
            curl -sL "$SHA_URL" -o last_sha.txt
            echo "Downloaded last SHA from release"
          else
            echo "No last_sha.txt found in latest release"
          fi
        continue-on-error: true

      - name: Check for updates
        id: compare
        run: |
          LATEST_SHA=$(git rev-parse HEAD)
          echo "LATEST_SHA=${LATEST_SHA}" >> $GITHUB_OUTPUT
          if [ -f last_sha.txt ]; then
            LAST_SHA=$(cat last_sha.txt)
            echo "LAST_SHA=${LAST_SHA}" >> $GITHUB_OUTPUT
            echo "Last SHA: $LAST_SHA | Latest SHA: $LATEST_SHA"
          else
            LAST_SHA=""
            echo "LAST_SHA=" >> $GITHUB_OUTPUT
            echo "No previous SHA found. First run detected."
          fi
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "$LATEST_SHA" != "$LAST_SHA" ]; then
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
            echo "$LATEST_SHA" > last_sha.txt
          else
            echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract Version
        if: steps.compare.outputs.SHOULD_RUN == 'true'
        id: version
        run: |
          VER=$(grep -E -o 'versionName = "[^"]*"' app/build.gradle.kts | cut -d'"' -f2)
          SHA=$(git rev-parse HEAD)
          VERSION="${VER}+${SHA:0:7}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build:
    runs-on: ubuntu-latest
    needs: [check-updates]
    if: needs.check-updates.outputs.SHOULD_RUN == 'true'

    steps:
      - name: Save Santotsu patches
        uses: actions/checkout@v4

      - run: cp .github/patches/AppUpdater.kt /tmp/AppUpdater.kt

      - name: Checkout Repository
        run: |
          git clone --branch dev https://git.rebelonion.dev/rebelonion/Dantotsu.git .

      - name: Apply Santotsu Alpha renaming
        run: |
          sed -i 's/ani.dantotsu.beta/ani.dantotsu.betas/g' app/google-services.json || true
          sed -i 's/ani.dantotsu.alpha/ani.dantotsu.alphas/g' app/google-services.json || true

          sed -i 's/applicationIdSuffix *= *".beta"/applicationIdSuffix = ".betas"/g' app/build.gradle.kts

          sed -i 's/Dantotsu α/Santotsu α/g' app/src/alpha/res/values/strings.xml || true
          sed -i 's/Dantotsu β/Santotsu β/g' app/src/debug/res/values/strings.xml || true

      - name: Embed version with SHA into BuildConfig
        run: |
          VER=$(grep -E -o 'versionName = "[^"]*"' app/build.gradle.kts | cut -d'"' -f2)
          sed -i "s|versionName = \"${VER}\"|versionName = \"${{ needs.check-updates.outputs.VERSION }}\"|" app/build.gradle.kts

      - name: Point update checker to Santotsu repo
        run: |
          sed -i 's|<string name="repo" translatable="false">rebelonion/Dantotsu</string>|<string name="repo" translatable="false">Shebyyy/Dantotsu-Alpha</string>|' app/src/main/res/values/strings.xml

      - name: Patch AppUpdater for Santotsu
        run: |
          cp /tmp/AppUpdater.kt app/src/google/java/ani/dantotsu/others/AppUpdater.kt

      - name: Fetch full history for commit log
        run: |
          if [ -n "${{ needs.check-updates.outputs.LAST_SHA }}" ]; then
            git fetch --unshallow || true
            git fetch --depth=100 origin dev || true
          fi

      - name: Generate Commit Log
        id: commit-log
        run: |
          REPO_URL="https://git.rebelonion.dev/rebelonion/Dantotsu"
          if [ -n "${{ needs.check-updates.outputs.LAST_SHA }}" ]; then
            LAST_SHA="${{ needs.check-updates.outputs.LAST_SHA }}"
            if git cat-file -e "$LAST_SHA^{commit}" 2>/dev/null; then
              COMMIT_LOGS=$(git log $LAST_SHA..HEAD --pretty=format:"● %s ~%an [֍](${REPO_URL}/commit/%H)" --max-count=10)
            else
              echo "Warning: Last SHA not found in history, showing last 10 commits"
              COMMIT_LOGS=$(git log HEAD --pretty=format:"● %s ~%an [֍](${REPO_URL}/commit/%H)" --max-count=10)
            fi
          else
            LAST_SHA=$(git rev-list --max-parents=0 HEAD)
            COMMIT_LOGS=$(git log $LAST_SHA..HEAD --pretty=format:"● %s ~%an [֍](${REPO_URL}/commit/%H)" --max-count=10)
          fi
          if [ -z "$COMMIT_LOGS" ]; then
            COMMIT_LOGS="● No new commits since last release"
          fi
          COMMIT_LOGS=$(echo "$COMMIT_LOGS" | sed -E "s@#([0-9]+)@[#\1](${REPO_URL}/pull/\1)@g")
          # Save for Telegram
          echo "COMMIT_LOG<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Save base commit log
          echo -e "Commits:\n" > commit_log.txt
          echo "$COMMIT_LOGS" | sed 's/●/\n●/g' | sed '/^$/d' >> commit_log.txt

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
          cache: gradle

      - name: Add Split APK Configuration
        run: |
          if ! grep -q "splits {" app/build.gradle.kts; then
            sed -i '/^android {/a\
                splits {\
                    abi {\
                        isEnable = true\
                        reset()\
                        include("armeabi-v7a", "arm64-v8a", "x86", "x86_64")\
                        isUniversalApk = true\
                    }\
                }' app/build.gradle.kts
          fi

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/key.keystore

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleGoogleAlpha \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/key.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Process APKs and Generate Checksums
        run: |
          cd app/build/outputs/apk/google/alpha/
          if [ -f "app-google-universal-alpha.apk" ]; then
            UNIVERSAL="app-google-universal-alpha.apk"
          elif [ -f "app-google-alpha.apk" ]; then
            UNIVERSAL="app-google-alpha.apk"
          fi
          
          {
            echo -e "\n---\n### Checksums\n"
            echo "| Variant | SHA-256 |"
            echo "| ------- | ------- |"
            if [ -n "$UNIVERSAL" ]; then
              SHA=$(sha256sum "$UNIVERSAL" | cut -d' ' -f1)
              echo "| Universal | $SHA |"
            fi
            for apk in app-google-*-release.apk; do
              [ "$apk" = "$UNIVERSAL" ] && continue
              [ "$apk" = "app-google-*-release.apk" ] && continue
              ABI=$(echo "$apk" | sed 's/app-google-//' | sed 's/-release.apk//')
              SHA=$(sha256sum "$apk" | cut -d' ' -f1)
              echo "| $ABI | $SHA |"
            done
            echo -e "\n---\n"
          } > $GITHUB_WORKSPACE/checksums.txt
          
          cd $GITHUB_WORKSPACE
          {
            cat commit_log.txt
            cat checksums.txt
            CURRENT_TAG_SAFE=$(echo "v${{ needs.check-updates.outputs.VERSION }}" | sed 's/+/%2B/g')
            echo "![Total Downloads](https://img.shields.io/github/downloads/Shebyyy/Dantotsu-Alpha/total?style=for-the-badge&label=TOTAL%20DOWNLOADS&labelColor=black&color=white) ![Current Release](https://img.shields.io/github/downloads/Shebyyy/Dantotsu-Alpha/${CURRENT_TAG_SAFE}/total?style=for-the-badge&label=CURRENT%20RELEASE&labelColor=black&color=white)"
          } > commit_log_santotsu.txt

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Santotsu-APKs
          retention-days: 5
          compression-level: 9
          path: app/build/outputs/apk/google/alpha/*.apk

      - name: Upload to Telegram
        env:
          VERSION: ${{ needs.check-updates.outputs.VERSION }}
          COMMIT_LOG: ${{ steps.commit-log.outputs.COMMIT_LOG }}
        run: |
          cd app/build/outputs/apk/google/alpha/
          if [ -f "app-google-universal-alpha.apk" ]; then
            APK_PATH="app-google-universal-alpha.apk"
          elif [ -f "app-google-alpha.apk" ]; then
            APK_PATH="app-google-alpha.apk"
          else
            echo "No universal APK found!"
            exit 1
          fi
          
          telegram_commit_messages=$(echo "$COMMIT_LOG" | while read -r line; do
            message=$(echo "$line" | sed -E 's/● (.*) ~(.*) \[֍\]\((.*)\)/● \1 ~\2 <a href="\3">֍<\/a>/')
            message=$(echo "$message" | sed -E 's/\[#([0-9]+)\]\((https:\/\/[^)]+)\)/<a href="\2">#\1<\/a>/g')
            echo "$message"
          done)
          telegram_commit_messages="<blockquote>${telegram_commit_messages}</blockquote>"
          
          curl -sS -f -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "document=@$APK_PATH" \
            -F "caption=🔥 New Santotsu Build Available!
          Commits:
          ${telegram_commit_messages}
          Version: ${VERSION}" \
            -F "parse_mode=HTML"

      - name: Save SHA for next run
        run: |
          echo "${{ needs.check-updates.outputs.LATEST_SHA }}" > last_sha.txt

      - name: Delete existing tags and releases if exists
        run: |
          TAG="v${{ needs.check-updates.outputs.VERSION }}"
          gh release delete "$TAG" -y --repo Shebyyy/Dantotsu-Alpha || true
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/Shebyyy/Dantotsu-Alpha.git :refs/tags/$TAG || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release in Dantotsu-Alpha
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.check-updates.outputs.VERSION }}
          name: Santotsu v${{ needs.check-updates.outputs.VERSION }}
          bodyFile: commit_log_santotsu.txt
          artifacts: |
            app/build/outputs/apk/google/alpha/*.apk
            last_sha.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          makeLatest: true

      - name: Upload Commit Log Artifact
        uses: actions/upload-artifact@v4
        with:
          name: commit-log
          path: commit_log_santotsu.txt
          retention-days: 30
